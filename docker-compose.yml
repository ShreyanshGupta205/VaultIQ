version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=file:../prisma/dev.db
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - vaultiq_data:/app/prisma
    depends_on:
      - redis
    networks:
      - vaultiq_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - vaultiq_network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vaultiq_network

volumes:
  vaultiq_data:
  redis_data:

networks:
  vaultiq_network:
    driver: bridge
